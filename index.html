      +'<div style="display:flex;align-items:center;justify-content:space-between;margin:0 5px 11px">'
      +'<div style="font:800 12px Archivo;letter-spacing:.16em;text-transform:uppercase;color:var(--ink)">Standings</div>'
      +'<button data-act="rules" style="background:var(--chip);border:1px solid var(--chip-border);color:var(--chip-ink);border-radius:999px;padding:5px 12px;font:800 11px Archivo;cursor:pointer">ⓘ Points</button></div>'
      +'<div style="display:flex;gap:6px;margin:0 5px 10px">'+[['main','Main Pot'],['app','App Pot']].map(function(m){var active=lbMode===m[0];return '<button data-act="lbmode" data-mode="'+m[0]+'" style="border:1px solid '+(active?'var(--gold)':'var(--chip-border)')+';background:'+(active?'var(--gold)':'var(--chip)')+';color:'+(active?'#15233f':'var(--chip-ink)')+';border-radius:999px;padding:5px 13px;font:800 11px Archivo;cursor:pointer">'+m[1]+'</button>';}).join('')+'</div>'
      +'<div style="font:600 11px/1.5 Archivo;color:var(--muted);margin:0 5px 12px">'+(lbMode==='app'?'App-game pot \u2014 only players paid in.':'All 12 players \u2014 everyone is in the main pot.')+'</div>'
      +rules
      +'<div style="display:flex;flex-direction:column;gap:9px">'+rows+'</div>'
      +'<div style="text-align:center;font:700 11px Archivo;color:var(--muted);padding:16px 0 0">Results updated '+esc(D.resultsUpdated||D.updated||'')+'</div></div>';
  }

  function viewTeams(){
    var defs=[['total','Points'],['rank','FIFA'],['group','Group'],['owner','Owner'],['gf','Goals'],['bonus','Bonus']];
    var arrow=state.sortDir<0?' ↓':' ↑';
    var chips=defs.map(function(c){
      var active=c[0]===state.sortKey;
      return '<button data-act="sort" data-key="'+c[0]+'" style="border:1px solid '+(active?'var(--gold)':'var(--chip-border)')+';background:'+(active?'var(--gold)':'var(--chip)')+';color:'+(active?'#15233f':'var(--chip-ink)')+';border-radius:999px;padding:5px 12px;font:800 11px Archivo;cursor:pointer">'+c[1]+(active?arrow:'')+'</button>';
    }).join('');
    var rows=Object.keys(D.teams).map(function(code){ var t=D.teams[code], s=computeTeam(code); return {code:code,name:t.name,group:t.group,rank:t.rank,owner:ownerOf(code),gf:s.gf,bonus:s.bonus,total:s.total,s:s}; });
    var k=state.sortKey, dir=state.sortDir;
    rows.sort(function(a,b){ var av=a[k],bv=b[k]; if(typeof av==='string') return dir*av.localeCompare(bv); return dir*(av-bv); });
    var html=rows.map(function(r){
      var s=r.s, fav=(r.code===D.favourite)?'<span style="font-size:11px">⭐</span>':'';
      var totCol=r.total<0?'var(--red)':'var(--ink)';
      var bonus=s.bonus>0?'<span style="color:var(--green);font-weight:800">· '+fmt(s.bonus)+' bonus</span>':'';
      return '<div style="background:var(--card);border:1.5px solid var(--card-border);border-radius:13px;padding:9px 12px;box-shadow:2px 3px 0 var(--shadow)">'
        +'<div style="display:flex;align-items:center;gap:9px">'+flagImg(r.code,26,18,3)
        +'<span style="font:800 14px Archivo;color:var(--ink)">'+esc(r.name)+'</span>'
        +'<span style="font:700 10px Archivo;color:var(--muted)">#'+r.rank+'</span>'+fav
        +'<span style="margin-left:auto;font:900 17px Archivo;color:'+totCol+'">'+fmt(r.total)+'</span></div>'
        +'<div style="display:flex;align-items:center;gap:7px;margin-top:7px;font:600 11px Archivo;color:var(--muted);flex-wrap:wrap">'
        +'<span style="background:var(--chip);border:1px solid var(--chip-border);border-radius:6px;padding:1px 7px;color:var(--chip-ink);font-weight:800;white-space:nowrap">Grp '+esc(r.group)+'</span>'
        +'<span style="font-weight:800;color:var(--ink)">'+esc(r.owner)+'</span>'
        +'<span>· '+s.played+'P '+s.wins+'W '+s.draws+'D '+s.losses+'L</span>'
        +'<span>· '+s.gf+'⚽</span><span>· '+s.yellow+'🟨 '+s.red+'🟥</span>'+bonus+'</div></div>';
    }).join('');
    return '<div class="fadeup" style="padding:15px 11px 22px">'
      +'<div style="font:800 12px Archivo;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);margin:0 5px 11px">All '+Object.keys(D.teams).length+' Teams</div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin:0 5px 13px">'+chips+'</div>'
      +'<div style="display:flex;flex-direction:column;gap:7px">'+html+'</div></div>';
  }

  function viewResults(){
    var byDate={}; (D.matches||[]).forEach(function(m){ (byDate[m.date]=byDate[m.date]||[]).push(m); });
    var days=Object.keys(byDate).sort().reverse();
    var sel=state.resultsDate||'';
    var shown=sel?days.filter(function(d){return d===sel;}):days;
    var opts='<option value="">All dates</option>'+days.map(function(d){return '<option value="'+d+'"'+(d===sel?' selected':'')+'>'+esc(fmtDate(d))+'</option>';}).join('');
    var filter='<div style="margin:0 5px 12px"><select data-act="resdate" style="width:100%;font:700 12px Archivo;color:var(--ink);background:var(--chip);border:1px solid var(--chip-border);border-radius:10px;padding:8px 11px">'+opts+'</select></div>';
    var html=shown.map(function(date){
      var items=byDate[date].map(function(m){
        var tH=D.teams[m.home], tA=D.teams[m.away];
        var score=(m.hs!=null&&m.as!=null)?(m.hs+' \u2013 '+m.as):'vs';
        var bz=matchBonuses(m);
        var bonusBar=bz.length?'<div style="background:var(--card-soft);border-top:1px solid var(--card-soft-border);padding:7px 12px;font:700 10.5px/1.5 Archivo;color:var(--green);text-align:center">\u26a1 '+esc(bz.join('  \u00b7  '))+'</div>':'';
        var key=m.date+'|'+m.home+'|'+m.away;
        var open=!!(state.resExpanded&&state.resExpanded[key]);
        var detail='';
        if(open){
          var _g=Array.isArray(m.goals)?m.goals:null, _c=Array.isArray(m.cards)?m.cards:null;
          var _scl=function(sd){return (_g||[]).filter(function(g){return g.s===sd;}).map(function(g){return esc(g.p||'')+" "+(g.m||'')+"'"+(g.pen?' (P)':'')+(g.og?' (OG)':'');}).join('<br>');};
          var _sh=_g?_scl('h'):'', _sa=_g?_scl('a'):'';
          var scorers=(_sh||_sa)?'<div style="display:flex;gap:6px;padding:4px 12px 9px;font:600 11px/1.55 Archivo;color:var(--muted)"><div style="flex:1;text-align:right">'+_sh+'</div><div style="width:16px;text-align:center">\u26bd</div><div style="flex:1;text-align:left">'+_sa+'</div></div>':'';
          var bookings=(_c&&_c.length)?'<div style="display:flex;justify-content:center;flex-wrap:wrap;gap:6px 12px;padding:0 12px 9px;font:600 10.5px Archivo;color:var(--muted)">'+_c.map(function(c){return (c.c==='r'?'\ud83d\udfe5':'\ud83d\udfe8')+' '+esc((c.p||'').split(' ').slice(-1)[0])+" "+(c.m||'')+"'";}).join('')+'</div>':'';
          detail='<div class="fadeup-sm">'+scorers+bookings+'</div>';
        }
        return '<div style="background:var(--card);border:1.5px solid var(--card-border);border-radius:13px;box-shadow:2px 3px 0 var(--shadow);overflow:hidden">'
          +'<div class="tap" data-act="resx" data-k="'+esc(key)+'" style="display:flex;align-items:center;padding:11px 12px;gap:8px;cursor:pointer">'
          +'<span style="flex:1;display:flex;align-items:center;gap:7px;justify-content:flex-end;text-align:right;font:700 13px Archivo;color:var(--ink)">'+esc(tH?tH.name:m.home)+' '+flagImg(m.home,24,16,2)+'</span>'
          +'<span style="font:900 18px Archivo;color:var(--ink);min-width:62px;text-align:center">'+score+'</span>'
          +'<span style="flex:1;display:flex;align-items:center;gap:7px;font:700 13px Archivo;color:var(--ink)">'+flagImg(m.away,24,16,2)+' '+esc(tA?tA.name:m.away)+'</span>'
          +'<span style="font:700 11px Archivo;color:var(--muted);width:10px;text-align:center">'+(open?'\u25b4':'\u25be')+'</span></div>'
          +bonusBar+detail+'</div>';
      }).join('');
      return '<div style="font:800 11px Archivo;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin:15px 5px 8px">'+esc(fmtDate(date))+'</div>'
        +'<div style="display:flex;flex-direction:column;gap:8px">'+items+'</div>';
    }).join('');
    return '<div class="fadeup" style="padding:15px 11px 22px">'
      +'<div style="font:800 12px Archivo;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);margin:0 5px 11px">Match Results</div>'
      +filter+html+'</div>';
  }
  function viewPrizes(){
    var fee=D.entryFee||0;
    var paid=D.players.filter(function(p){return p.paid;}), unpaid=D.players.filter(function(p){return !p.paid;}).map(function(p){return p.name;});
    var appPot=paid.length*fee;
    var WT=D.wcTable||{}, worstHtml='to be decided';
    var wc=Object.keys(WT);
    if(wc.length){
      var _arr=wc.map(function(c){return {c:c,pts:WT[c].pts,gd:WT[c].gd};}).sort(function(a,b){return a.pts-b.pts||a.gd-b.gd;});
      var _w0=_arr[0], _tied=_arr.filter(function(x){return x.pts===_w0.pts&&x.gd===_w0.gd;});
      var _sc=_w0.pts+'p '+(_w0.gd>=0?'+':'')+_w0.gd;
      if(_tied.length===1){ worstHtml=flagImg(_w0.c,18,12,2)+' '+esc((D.teams[_w0.c]||{}).name||_w0.c)+' · '+esc(ownerOf(_w0.c))+' · '+_sc; }
      else { worstHtml=_tied.map(function(x){return flagImg(x.c,18,12,2)+' '+esc((D.teams[x.c]||{}).name||x.c)+' ('+esc(ownerOf(x.c))+')';}).join(' &nbsp;·&nbsp; ')+' · '+_sc+' (shared)'; }
    }
    var fav=D.favourite, ft=fav?D.teams[fav]:null;
    var favEl=(fav&&ft)?flagImg(fav,22,15,2):'';

    return '<div class="fadeup" style="padding:15px 11px 22px">'
      +'<div style="font:800 12px Archivo;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);margin:0 5px 12px">Prizes</div>'
      +'<div style="background:var(--card);border:2px solid var(--card-border);border-radius:18px;box-shadow:3px 4px 0 var(--shadow);padding:18px 18px 16px;text-align:center">'
        +'<div style="font:800 10px Archivo;letter-spacing:.14em;color:var(--muted);text-transform:uppercase">Main pot · all 12 in</div>'
        +'<div style="font:900 46px/1 Archivo;color:var(--accent);margin-top:6px">€600</div>'
        +'<div style="display:flex;flex-direction:column;gap:8px;margin-top:15px;text-align:left">'
          +'<div style="display:flex;gap:11px;align-items:baseline;background:var(--card-soft);border:1px solid var(--card-soft-border);border-radius:10px;padding:10px 13px"><span style="font:900 14px Archivo;color:var(--green);white-space:nowrap;min-width:62px">🏆 €500</span><span style="font:600 12.5px/1.4 Archivo;color:var(--ink)">World Cup winner — whoever owns the team that lifts the trophy</span></div>'
          +'<div style="display:flex;gap:11px;align-items:baseline;background:var(--card-soft);border:1px solid var(--card-soft-border);border-radius:10px;padding:10px 13px"><span style="font:900 14px Archivo;color:var(--green);white-space:nowrap;min-width:62px">🥈 €50</span><span style="font:600 12.5px/1.4 Archivo;color:var(--ink)">Runner-up — owner of the beaten finalists</span></div>'
          +'<div style="display:flex;gap:11px;align-items:baseline;background:var(--card-soft);border:1px solid var(--card-soft-border);border-radius:10px;padding:10px 13px"><span style="font:900 14px Archivo;color:var(--green);white-space:nowrap;min-width:62px">🥄 €50</span><span style="font:600 12.5px/1.4 Archivo;color:var(--ink)">Wooden spoon — owner of the worst team (points, then goal difference; shared if tied)<br><span style="display:block;color:var(--accent);font-weight:800;margin-top:5px;line-height:1.55">'+worstHtml+'</span></span></div>'
        +'</div>'
        +'<div style="margin-top:14px;background:var(--card-soft);border:1px solid var(--card-soft-border);border-radius:10px;padding:11px 13px"><div style="font:800 10px Archivo;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)">🎲 Bookies\' favourite to win the Cup</div>'
        +'<div style="display:inline-flex;align-items:center;gap:7px;margin-top:6px;font:700 14px Archivo;color:var(--ink)">'+favEl+'<b>'+esc(ft?ft.name:'—')+'</b> <span style="color:var(--accent);font-weight:800">#'+(ft?ft.rank:'')+'</span> · '+esc(fav?ownerOf(fav):'—')+'</div></div>'
      +'</div>'
      +'<div style="background:var(--card);border:2px solid var(--card-border);border-radius:18px;box-shadow:3px 4px 0 var(--shadow);padding:18px;text-align:center;margin-top:14px">'
        +'<div style="font:800 10px Archivo;letter-spacing:.14em;color:var(--muted);text-transform:uppercase">App game pot · this leaderboard</div>'
        +'<div style="font:900 46px/1 Archivo;color:var(--accent);margin-top:6px">€'+appPot+'</div>'
        +'<div style="font:800 12px Archivo;color:var(--ink);text-transform:uppercase;letter-spacing:.08em;margin-top:9px">Winner takes all — tops this table</div>'
        +'<div style="font:600 12.5px/1.5 Archivo;color:var(--muted);margin-top:9px">€'+fee+' each · '+paid.length+'/'+D.players.length+' paid<br>'+(unpaid.length?('Still to pay: '+esc(unpaid.join(', '))):'Everyone in!')+'</div>'
      +'</div></div>';
  }

  function lightboxHtml(){
    if(!state.lightbox) return '';
    var p=D.players.find(function(p){return p.id===state.lightbox;}); if(!p) return '';
    var flags=(p.teams||[]).map(function(c){ return '<img src="'+flagUrl(c,80)+'" style="width:32px;height:22px;border-radius:2px;object-fit:cover;box-shadow:0 0 0 1px rgba(255,255,255,.25)">'; }).join('');
    return '<div data-act="closelb" style="position:absolute;inset:0;background:rgba(10,8,12,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;cursor:zoom-out;padding:30px">'
      +'<img src="'+photoSrc(p)+'" style="width:236px;height:236px;border-radius:50%;object-fit:cover;border:5px solid #fff;box-shadow:0 18px 50px rgba(0,0,0,.6)">'
      +'<div style="font:900 24px Archivo;color:#fff;margin:18px 0 12px">'+esc(p.name)+'</div>'
      +'<div style="display:flex;gap:7px">'+flags+'</div>'
      +'<div style="font:700 11px Archivo;color:rgba(255,255,255,.55);margin-top:20px;letter-spacing:.05em">tap anywhere to close</div></div>';
  }

  /* ---------- shell ---------- */
  function render(){
    var _prevTab=render._lastTab;
    var body;
    if(state.tab==='table') body=viewTable();
    else if(state.tab==='teams') body=viewTeams();
    else if(state.tab==='results') body=viewResults();
    else body=viewPrizes();

    var tabs=[['table','TABLE'],['teams','TEAMS'],['results','RESULTS'],['prizes','PRIZES']].map(function(t){
      var active=state.tab===t[0];
      return '<button data-act="tab" data-tab="'+t[0]+'" style="background:none;border:none;cursor:pointer;font:800 10px Archivo;letter-spacing:.06em;color:'+(active?'var(--tab-active)':'var(--tab-ink)')+';padding:4px 10px">'+t[1]+'</button>';
    }).join('');

    var header='<div style="flex:none;margin:9px 9px 0;background:var(--header-bg);border-radius:24px;padding:12px 18px 17px;position:relative;overflow:hidden">'
      +'<div style="position:absolute;right:-26px;top:44px;width:96px;height:96px;background:var(--accent);border-radius:50%;opacity:.85"></div>'
      
      +'<div style="position:relative;display:flex;justify-content:space-between;align-items:flex-start;margin-top:11px">'
        +'<div><div style="font:800 10px/1 Archivo;letter-spacing:.22em;color:var(--header-eyebrow);text-transform:uppercase">World Cup 2026 · Sweepstake</div>'
        +'<div style="font:400 38px/.9 \'Archivo Black\';color:#fff;margin-top:8px">CLEARY\'S<br>CUP</div></div>'
        +'<button data-act="theme" style="flex:none;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center">'+(state.theme==='dark'?'☀️':'🌙')+'</button></div>'
      +'<div style="position:relative;display:inline-flex;align-items:center;gap:7px;margin-top:13px;background:rgba(255,255,255,.1);border:1px solid rgba(244,197,74,.45);border-radius:999px;padding:5px 13px">'
        +'<span style="width:7px;height:7px;border-radius:50%;background:var(--gold)"></span>'
        +'<span style="font:700 11px Archivo;color:#dfe8f5">'+esc(statusText())+'</span></div></div>';

    var _sc=document.getElementById('scroll'); var _sy=(_sc&&render._lastTab===state.tab)?_sc.scrollTop:0;
    screenEl.setAttribute('data-theme', state.theme);
    try{document.documentElement.style.colorScheme=state.theme;}catch(e){}
    screenEl.innerHTML = header
      + '<div class="scrollarea" id="scroll">'+body+'</div>'
      + lightboxHtml()
      + '<div style="flex:none;background:var(--tab-bg);display:flex;justify-content:space-around;align-items:center;padding:11px 0 21px">'+tabs+'</div>';
    var _ns=document.getElementById('scroll'); if(_ns) _ns.scrollTop=_sy;
    render._lastTab=state.tab;

    if(state.tab==='table'){ if(_prevTab!=='table') animateCounts(); tickCountdowns(); }
  }

  /* ---------- animated point counts ---------- */
  function animateCounts(){
    var els=screenEl.querySelectorAll('[data-count]');
    if(!els.length) return;
    var finals=[].map.call(els,function(e){return parseInt(e.getAttribute('data-count'),10)||0;});
    var start=performance.now(), dur=850, ease=function(k){return 1-Math.pow(1-k,3);};
    function step(t){
      var k=Math.min(1,(t-start)/dur), e=ease(k);
      for(var i=0;i<els.length;i++) els[i].textContent=Math.round(finals[i]*e);
      if(k<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  /* ---------- events ---------- */
  screenEl.addEventListener('click', function(ev){
    var el=ev.target.closest('[data-act]'); if(!el) return;
    var act=el.getAttribute('data-act');
    if(act==='tab'){ state.tab=el.getAttribute('data-tab'); state.expanded=null; render(); }
    else if(act==='lbmode'){ state.lbMode=el.getAttribute('data-mode'); state.expanded=null; render(); }
    else if(act==='theme'){ state.theme=state.theme==='light'?'dark':'light'; try{localStorage.setItem('cc_theme',state.theme);}catch(e){} render(); }
    else if(act==='rules'){ state.showRules=!state.showRules; render(); }
    else if(act==='expand'){ var id=el.getAttribute('data-id'); state.expanded=state.expanded===id?null:id; render(); }
    else if(act==='resx'){ var rk=el.getAttribute('data-k'); state.resExpanded[rk]=!state.resExpanded[rk]; render(); }
    else if(act==='todaymore'){ state.todayExpanded=!state.todayExpanded; render(); }
    else if(act==='sort'){ var k=el.getAttribute('data-key'); if(state.sortKey===k) state.sortDir*=-1; else { state.sortKey=k; state.sortDir=(k==='name'||k==='group'||k==='owner'||k==='rank')?1:-1; } render(); }
    else if(act==='photo'){ ev.stopPropagation(); state.lightbox=el.getAttribute('data-id'); render(); }
    else if(act==='closelb'){ state.lightbox=null; render(); }
  });

  function pollLive(){
    fetch(WORKER_URL,{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
      var nl=d.live||[], now=Date.now(), next;
      if(nl.length){ next=nl; lastLiveTs=now; }
      else if(now-lastLiveTs<=150000){ next=LIVE; }
      else { next=[]; }
      if(JSON.stringify(next)!==JSON.stringify(LIVE)){ LIVE=next; if(state.tab==='table') render(); }
    }).catch(function(){});
  }
  screenEl.addEventListener('change', function(ev){ var el=ev.target; if(el&&el.getAttribute&&el.getAttribute('data-act')==='resdate'){ state.resultsDate=el.value; render(); } });
  render(); pollLive(); setInterval(pollLive, 45000); setInterval(tickCountdowns, 30000);
  setInterval(function(){var f=document.querySelector('.burnflip');if(f)f.classList.toggle('flipped');}, 10000);
})();
</script>
