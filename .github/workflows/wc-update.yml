name: WC Update
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "dryrun (preview only) or live (updates the site)"
        default: "dryrun"
        type: choice
        options: [dryrun, live]
  schedule:
    - cron: "*/15 * * * *"   # every 15 min; commits only when results change
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run updater
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          MODE: ${{ github.event.inputs.mode || 'live' }}   # scheduled runs => live
        run: python3 scripts/wc_update.py
      - name: Commit
        run: |
          git config user.name "WorldCup AutoUpdate"
          git config user.email "worldcup-bot@local"
          git add -A
          git commit -m "WC auto-update" || echo "no change"
          git push
